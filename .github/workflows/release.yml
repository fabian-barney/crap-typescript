name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up npm 11.14.1
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: npm ci

      - name: Verify release versions
        run: npm run verify-release-version

      - name: Render release notes
        run: node ./scripts/render-release-notes.mjs "${GITHUB_REF_NAME}" > release-notes.md

      - name: Run build and tests
        run: npm test

      - name: Run cognitive-typescript gate
        run: npm run cognitive-typescript-check

      - name: Run crap-typescript gate
        run: npm run crap-typescript-check

      - name: Build publish artifacts
        run: |
          mkdir -p release-artifacts
          npm run build
          npm pack --workspaces --pack-destination release-artifacts
          cp release-notes.md release-artifacts/release-notes.md

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download publish artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Publish packages
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm publish "release-artifacts/barney-media-crap-typescript-core-${version}.tgz" --access public
          npm publish "release-artifacts/barney-media-crap-typescript-${version}.tgz" --access public
          npm publish "release-artifacts/barney-media-crap-typescript-vitest-${version}.tgz" --access public
          npm publish "release-artifacts/barney-media-crap-typescript-jest-${version}.tgz" --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-artifacts/release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-artifacts/release-notes.md
          fi
