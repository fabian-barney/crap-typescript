name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Verify release versions
        run: npm run verify-release-version

      - name: Run build and tests
        run: npm test

      - name: Publish core
        run: npm publish --workspace packages/core --access public

      - name: Publish CLI
        run: npm publish --workspace packages/cli --access public

      - name: Publish Vitest adapter
        run: npm publish --workspace packages/vitest --access public

      - name: Publish Jest adapter
        run: npm publish --workspace packages/jest --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          cat > release-notes.md <<EOF
          ## Packages

          - \`@barney-media/crap-typescript-core@${version}\`
          - \`@barney-media/crap-typescript@${version}\`
          - \`@barney-media/crap-typescript-vitest@${version}\`
          - \`@barney-media/crap-typescript-jest@${version}\`
          EOF

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          fi
