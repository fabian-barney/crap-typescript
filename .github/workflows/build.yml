name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: ["22.12.0", "24.0.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            packages/*/dist
            packages/*/.tsbuildinfo
          if-no-files-found: error

  test-unit:
    name: test / unit (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    needs:
      - build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: ["22.12.0", "24.0.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ matrix.os }}-${{ matrix.node-version }}
          path: .

      - name: Run unit tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.node-version }}
          path: coverage
          if-no-files-found: error

  lint:
    name: verify / lint
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.0
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  package:
    name: package
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.0
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output-ubuntu-latest-24.0.0
          path: .

      - name: Verify workspace packages
        run: npm pack --workspaces

  quality-crap-crap-typescript:
    name: verify / quality-crap-crap-typescript
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.0
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output-ubuntu-latest-24.0.0
          path: .

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-ubuntu-latest-24.0.0
          path: coverage

      - name: Run crap-typescript gate
        run: npm run crap-typescript-check

  quality-cognitive-crap-typescript:
    name: verify / quality-cognitive-crap-typescript
    runs-on: ubuntu-latest
    needs:
      - build
      - test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24.0.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.0
          cache: npm

      - name: Set up npm 11.6.2
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-output-ubuntu-latest-24.0.0
          path: .

      - name: Run cognitive-typescript gate
        run: npm run cognitive-typescript-check
