name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up npm 11.14.1
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify workspace packages
        run: npm pack --workspaces

  cognitive-typescript-gate:
    name: cognitive-typescript Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up npm 11.14.1
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: npm ci

      - name: Run cognitive-typescript gate
        run: npm run cognitive-typescript-check

  crap-typescript-gate:
    name: crap-typescript Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up npm 11.14.1
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: npm ci

      - name: Run crap-typescript gate
        run: npm run crap-typescript-check
